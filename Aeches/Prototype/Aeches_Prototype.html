<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeches — Hand Entry Prototype</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  }
  .label {
    color: #555;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: -apple-system, sans-serif;
  }
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0D0D0D;
    border-radius: 50px;
    border: 2px solid #2A2A2A;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px #0A0A0A, 0 40px 100px rgba(0,0,0,0.9), inset 0 0 0 1px #333;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 30px;
    background: #0D0D0D;
    border-radius: 0 0 20px 20px;
    z-index: 200;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px rgba(201,168,76,0.3); }
    50%       { box-shadow: 0 0 24px rgba(201,168,76,0.6); }
  }
  textarea { font-family: -apple-system, sans-serif; }
  textarea:focus { outline: none; border-color: #C9A84C !important; }
  button:active { opacity: 0.85; transform: scale(0.97); }
</style>
</head>
<body>
<p class="label">Aeches — Hand Entry Prototype</p>
<div id="root"></div>
<p class="label" style="margin-top:12px">Click seats to record action • Tap ranks to enter cards</p>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ── DESIGN TOKENS ─────────────────────────────────────────────────────────────
const C = {
  bg:         '#0D0D0D',
  surface:    '#161616',
  surface2:   '#1E1E1E',
  surface3:   '#252525',
  green:      '#1B3A2D',
  greenDark:  '#142E22',
  gold:       '#C9A84C',
  goldLight:  '#E8D5A3',
  white:      '#FFFFFF',
  textBody:   '#DDDDDD',
  gray:       '#888888',
  grayDark:   '#3A3A3A',
  red:        '#C0392B',
  redBg:      '#2A1515',
  greenAction:'#27AE60',
  greenBg:    '#152A1B',
};

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const SUITS = ['♠','♥','♦','♣'];
const SUIT_COLORS = { '♠': C.white, '♥': '#E74C3C', '♦': '#E74C3C', '♣': C.white };
const SUIT_KEYS   = { '♠': 's', '♥': 'h', '♦': 'd', '♣': 'c' };
const POS_LABELS  = ['BTN','SB','BB','UTG','UTG+1','MP','MP+1','HJ','CO'];

// Compute seat positions on an ellipse, leaving a gap at 12 o'clock for the house dealer.
// n = number of player seats (6, 8, 9, or 10).
function getSeatPositionsForSize(n) {
  const cx = 195, cy = 145, rx = 155, ry = 95;
  const dealerGapDeg = 75; // degrees reserved at top for house dealer
  const startDeg = 90 - dealerGapDeg / 2; // first seat just clockwise of dealer (65°)
  const arcDeg   = 360 - dealerGapDeg;    // remaining arc for players (310°)
  const step = n <= 1 ? 0 : arcDeg / (n - 1);
  return Array.from({ length: n }, (_, i) => {
    const rad = (startDeg - i * step) * Math.PI / 180;
    return { x: cx + rx * Math.cos(rad), y: cy - ry * Math.sin(rad) };
  });
}
const SEAT_POS = getSeatPositionsForSize(9); // used by action/button screens

// ── SMALL SHARED COMPONENTS ───────────────────────────────────────────────────

function StatusBar() {
  return (
    <div style={{ height: 50, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 28px 0', flexShrink: 0 }}>
      <span style={{ color: C.white, fontSize: 15, fontWeight: 600 }}>9:41</span>
      <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
        <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="4" width="3" height="8" fill={C.white} rx="1"/><rect x="4" y="2" width="3" height="10" fill={C.white} rx="1"/><rect x="8" y="0" width="3" height="12" fill={C.white} rx="1"/><rect x="12" y="0" width="3" height="12" fill={C.white} rx="1" opacity="0.3"/></svg>
        <svg width="16" height="12" viewBox="0 0 20 16"><path d="M10 3.5C13.5 3.5 16.7 5 19 7.4L20.4 6C17.7 3.2 14 1.5 10 1.5s-7.7 1.7-10.4 4.5L1 7.4C3.3 5 6.5 3.5 10 3.5z" fill={C.white}/><path d="M10 7.5c2.2 0 4.2.9 5.6 2.4L17 8.5C15.2 6.6 12.7 5.5 10 5.5S4.8 6.6 3 8.5l1.4 1.4C5.8 8.4 7.8 7.5 10 7.5z" fill={C.white}/><circle cx="10" cy="14" r="2" fill={C.white}/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke={C.white} strokeWidth="1" fill="none"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill={C.white} opacity="0.4"/><rect x="1" y="2" width="17" height="8" rx="2" fill={C.white}/></svg>
      </div>
    </div>
  );
}

function TabBar({ activeTab, onTabChange }) {
  const tabs = [
    { id: 'record',  label: 'Record',      icon: '♠' },
    { id: 'hands',   label: 'My Hands',    icon: '≡' },
    { id: 'market',  label: 'Marketplace', icon: '◈' },
    { id: 'profile', label: 'Profile',     icon: '○' },
  ];
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 83, background: C.surface, borderTop: `1px solid ${C.grayDark}`, display: 'flex', alignItems: 'flex-start', paddingTop: 10, flexShrink: 0 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onTabChange(t.id)}
          style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0', transition: 'opacity 0.15s' }}>
          <span style={{ fontSize: 22, color: activeTab === t.id ? C.gold : C.gray, lineHeight: 1 }}>{t.icon}</span>
          <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.3, color: activeTab === t.id ? C.gold : C.gray }}>{t.label}</span>
          {activeTab === t.id && <div style={{ width: 4, height: 4, borderRadius: '50%', background: C.gold, marginTop: 2 }} />}
        </button>
      ))}

}

function GoldButton({ label, onPress, disabled, small }) {
  return (
    <button onClick={!disabled ? onPress : undefined}
      style={{ background: disabled ? C.grayDark : `linear-gradient(135deg, ${C.gold}, #9A6820)`, color: disabled ? C.gray : '#0D0D0D', border: 'none', borderRadius: 14, padding: small ? '12px 22px' : '16px 0', width: small ? 'auto' : '100%', fontSize: small ? 14 : 17, fontWeight: 700, cursor: disabled ? 'default' : 'pointer', letterSpacing: 0.3, boxShadow: disabled ? 'none' : `0 4px 24px rgba(201,168,76,0.25)`, transition: 'all 0.2s' }}>
      {label}
    </button>
  );
}

function BackButton({ onPress }) {
  return (
    <button onClick={onPress} style={{ background: 'none', border: 'none', color: C.gold, fontSize: 22, cursor: 'pointer', padding: '8px 4px 8px 0', lineHeight: 1 }}>
      ‹
    </button>
  );
}

function ScreenHeader({ title, onBack, right, centered }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', padding: '12px 24px 8px', flexShrink: 0, position: 'relative' }}>
      {onBack && <BackButton onPress={onBack} />}
      {centered ? (
        <span style={{ position: 'absolute', left: 0, right: 0, textAlign: 'center', color: C.white, fontSize: 18, fontWeight: 700, pointerEvents: 'none' }}>{title}</span>
      ) : (
        <span style={{ color: C.white, fontSize: 18, fontWeight: 700, marginLeft: onBack ? 8 : 0, flex: 1 }}>{title}</span>
      )}
      {right}
    </div>
  );
}

// ── TABLE OVAL ────────────────────────────────────────────────────────────────

function TableOval({ children, style = {} }) {
  const W = 390, H = 310;
  const CX = 195, CY = 150;
  const RX = 154, RY = 96;   // rail outer semi-axes
  const PX = 144, PY = 87;   // gold pinstripe
  const FX = 137, FY = 81;   // felt outer

  // Dealer notch: 88px wide, centered, with rounded corners
  const nL = CX - 44;
  const nR = CX + 44;
  const nB = CY - RY + 24;
  const r  = 9;

  // Notch clip path with rounded inner corners — feels machined, not stamped
  const notchPath = `M 0,0 L ${nL - r},0 Q ${nL},0 ${nL},${r} L ${nL},${nB - r} Q ${nL},${nB} ${nL + r},${nB} L ${nR - r},${nB} Q ${nR},${nB} ${nR},${nB - r} L ${nR},${r} Q ${nR},0 ${nR + r},0 L ${W},0 L ${W},${H} L 0,${H} Z`;

  return (
    <div style={{ position: 'relative', width: W, height: H, flexShrink: 0, ...style }}>
      <svg width={W} height={H} style={{ position: 'absolute', top: 0, left: 0, pointerEvents: 'none' }}>
        <defs>
          {/* Notch clip — rounded dealer cutout */}
          <clipPath id="notchClip">
            <path d={notchPath} />
          </clipPath>

          {/* Champagne-gold leather body — uniform gold all around, only subtle warmth shift */}
          <linearGradient id="railGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stopColor="#F0C868" />
            <stop offset="35%"  stopColor="#D4A33E" />
            <stop offset="65%"  stopColor="#BC8A2A" />
            <stop offset="100%" stopColor="#A47220" />
          </linearGradient>

          {/* Top specular highlight — soft glossy crest along the upper curve */}
          <radialGradient id="topSheen" cx="50%" cy="0%" r="55%">
            <stop offset="0%"   stopColor="rgba(255,245,200,0.45)" />
            <stop offset="50%"  stopColor="rgba(255,225,140,0.10)" />
            <stop offset="100%" stopColor="rgba(0,0,0,0)" />
          </radialGradient>

          {/* Side directional sheen — light from upper-left, gives 3D body */}
          <radialGradient id="sideSheen" cx="28%" cy="20%" r="75%">
            <stop offset="0%"   stopColor="rgba(255,250,210,0.22)" />
            <stop offset="55%"  stopColor="rgba(255,225,140,0.04)" />
            <stop offset="100%" stopColor="rgba(0,0,0,0)" />
          </radialGradient>

          {/* Bottom-edge bevel — only the very bottom curve darkens slightly,
              suggesting the rail rolls down. Does NOT fade the gold body. */}
          <radialGradient id="bottomShade" cx="50%" cy="100%" r="40%">
            <stop offset="0%"   stopColor="rgba(50,25,0,0.55)" />
            <stop offset="60%"  stopColor="rgba(50,25,0,0.10)" />
            <stop offset="100%" stopColor="rgba(0,0,0,0)" />
          </radialGradient>

          {/* Polished brass pinstripe gradient — slight gradient so it catches light */}
          <linearGradient id="brassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stopColor="#FFE9A8" />
            <stop offset="50%"  stopColor="#C99A3A" />
            <stop offset="100%" stopColor="#6E4612" />
          </linearGradient>

          {/* Felt radial gradient */}
          <radialGradient id="feltGrad" cx="36%" cy="30%" r="72%">
            <stop offset="0%"   stopColor="#26614A" />
            <stop offset="55%"  stopColor="#123A26" />
            <stop offset="100%" stopColor="#081E14" />
          </radialGradient>

          {/* Soft inner-felt vignette — recesses the playing surface */}
          <radialGradient id="feltVignette" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stopColor="rgba(0,0,0,0)" />
            <stop offset="100%" stopColor="rgba(0,0,0,0.55)" />
          </radialGradient>
        </defs>

        {/* ── Drop shadow beneath table — soft halo + crisp edge below ── */}
        <ellipse cx={CX} cy={CY + 22} rx={RX + 10} ry={RY + 6} fill="rgba(0,0,0,0.45)" />
        <ellipse cx={CX} cy={CY + 14} rx={RX + 5} ry={RY + 3} fill="rgba(0,0,0,0.70)" />
        <ellipse cx={CX} cy={CY + 8}  rx={RX + 2} ry={RY + 2} fill="rgba(0,0,0,0.85)" />

        {/* ── Outer rim — thin, dark, defines the silhouette ── */}
        <ellipse cx={CX} cy={CY} rx={RX + 1.5} ry={RY + 1.5} fill="#1A0E00" clipPath="url(#notchClip)" />

        {/* ── Gold leather rail body ── */}
        <ellipse cx={CX} cy={CY} rx={RX} ry={RY} fill="url(#railGrad)" clipPath="url(#notchClip)" />

        {/* ── Side directional sheen (light source upper-left) ── */}
        <ellipse cx={CX} cy={CY} rx={RX} ry={RY} fill="url(#sideSheen)" clipPath="url(#notchClip)" />

        {/* ── Top specular crest ── */}
        <ellipse cx={CX} cy={CY} rx={RX} ry={RY} fill="url(#topSheen)" clipPath="url(#notchClip)" />

        {/* ── Bottom shading for weight ── */}
        <ellipse cx={CX} cy={CY} rx={RX} ry={RY} fill="url(#bottomShade)" clipPath="url(#notchClip)" />

        {/* ── Crisp upper highlight — the catch of light on top of the curved leather ── */}
        <ellipse cx={CX} cy={CY - 1.5} rx={RX - 4} ry={RY - 4}
          fill="none" stroke="rgba(255,240,170,0.35)" strokeWidth="1"
          clipPath="url(#notchClip)" />

        {/* ── Polished brass pinstripe ── */}
        <ellipse cx={CX} cy={CY} rx={PX} ry={PY} fill="none"
          stroke="url(#brassGrad)" strokeWidth="1.6" clipPath="url(#notchClip)" />

        {/* ── Inner shadow groove — clean recess where rail meets felt ── */}
        <ellipse cx={CX} cy={CY} rx={PX - 2} ry={PY - 2} fill="none"
          stroke="rgba(0,0,0,0.7)" strokeWidth="2.5" clipPath="url(#notchClip)" />
        <ellipse cx={CX} cy={CY} rx={PX - 4} ry={PY - 3.5} fill="none"
          stroke="rgba(0,0,0,0.35)" strokeWidth="2" clipPath="url(#notchClip)" />

        {/* ── Felt surface ── */}
        <ellipse cx={CX} cy={CY} rx={FX} ry={FY} fill="url(#feltGrad)" clipPath="url(#notchClip)" />

        {/* ── Felt vignette ── */}
        <ellipse cx={CX} cy={CY} rx={FX} ry={FY} fill="url(#feltVignette)" clipPath="url(#notchClip)" />

        {/* ── Felt stitching ring ── */}
        <ellipse cx={CX} cy={CY} rx={FX - 11} ry={FY - 9} fill="none"
          stroke="rgba(255,230,160,0.10)" strokeWidth="1" strokeDasharray="3,3" clipPath="url(#notchClip)" />

        {/* ── HH watermark ── */}
        <text x={CX} y={CY + 10} textAnchor="middle" fontFamily="Georgia, serif"
          fontSize="28" fontWeight="900" letterSpacing="-2"
          fill="rgba(201,168,76,0.10)" clipPath="url(#notchClip)">HH</text>

      </svg>

      {children}
    </div>
  );
}

// Individual seat button on the table
function SeatButton({ pos, index, heroSeat, buttonSeat, seatState, activeSeat, onClick, showPos = true }) {
  const isHero   = index === heroSeat;
  const hasBtn   = index === buttonSeat;
  const isActive = index === activeSeat;

  // Derive visual state
  const action = seatState?.action;
  let bg = isHero ? C.green : C.surface2;
  let borderColor = isHero ? C.gold : C.grayDark;
  let textColor = isHero ? C.gold : C.gray;
  let icon = null;

  if (action === 'fold')                          { bg = C.redBg;    borderColor = C.red;         textColor = C.red;         icon = '✕'; }
  else if (action === 'call' || action === 'check'){ bg = C.greenBg; borderColor = C.greenAction; textColor = C.greenAction; icon = action === 'check' ? '—' : '✓'; }
  else if (action === 'raise' || action === 'open'){ bg = '#221C0A';  borderColor = C.gold;        textColor = C.gold;        icon = seatState?.size ? `↑${seatState.size}` : '↑'; }

  const posLabel = POS_LABELS[(index - heroSeat + 9) % 9];

  return (
    <div style={{ position: 'absolute', left: pos.x - 22, top: pos.y - 22, zIndex: 20 }}>
      {hasBtn && (
        <div style={{ position: 'absolute', top: -7, right: -7, zIndex: 10, width: 18, height: 18, borderRadius: '50%', background: C.white, border: `1.5px solid ${C.gold}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, fontWeight: 900, color: '#000', boxShadow: `0 0 8px rgba(255,255,255,0.4)` }}>D</div>
      )}
      <button onClick={onClick}
        style={{ width: 44, height: 44, borderRadius: '50%', background: bg, border: `2px solid ${isActive ? C.gold : borderColor}`, color: textColor, fontSize: icon ? 12 : 10, fontWeight: 700, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1, transition: 'all 0.12s', animation: isActive ? 'pulse 1.5s infinite' : 'none', boxShadow: isActive ? `0 0 16px ${C.gold}88` : isHero && !action ? `0 0 12px rgba(201,168,76,0.2)` : 'none' }}>
        {icon ? (
          <span style={{ fontSize: icon.length > 2 ? 9 : 13, lineHeight: 1 }}>{icon}</span>
        ) : (
          <>
            <span style={{ fontSize: 10, lineHeight: 1 }}>{showPos ? posLabel : index + 1}</span>
            {isHero && <span style={{ fontSize: 7, color: `${C.gold}77`, lineHeight: 1 }}>YOU</span>}
          </>
        )}
      </button>
    </div>
  );
}

// ── SCREEN: SESSION DASHBOARD (active session) ────────────────────────────────

function SessionDashboard({ sessionType, handCount, startTime, onRecordHand, onEndSession }) {
  const [elapsed, setElapsed] = useState(0);

  useEffect(() => {
    const timer = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
    return () => clearInterval(timer);
  }, [startTime]);

  const fmt = (secs) => {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    return h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
      : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '8px 24px 24px', gap: 16 }}>
      {/* Session header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingTop: 4 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: '50%', background: C.greenAction, boxShadow: `0 0 8px ${C.greenAction}` }} />
          <span style={{ color: C.white, fontSize: 17, fontWeight: 700 }}>
            {sessionType === 'tournament' ? 'Tournament' : 'Cash Game'}
          </span>
        </div>
        <span style={{ color: C.gold, fontFamily: 'Courier New, monospace', fontSize: 16, fontWeight: 700, letterSpacing: 1 }}>{fmt(elapsed)}</span>
      </div>

      {/* Stats row */}
      <div style={{ display: 'flex', gap: 10 }}>
        {[
          { label: 'Hands Recorded', value: handCount },
          { label: 'Session Status', value: 'Live' },
        ].map(stat => (
          <div key={stat.label} style={{ flex: 1, background: C.surface2, borderRadius: 12, padding: '14px 16px', border: `1px solid ${C.grayDark}` }}>
            <div style={{ color: C.gray, fontSize: 11, fontWeight: 600, letterSpacing: 0.8, marginBottom: 6 }}>{stat.label.toUpperCase()}</div>
            <div style={{ color: stat.label === 'Session Status' ? C.greenAction : C.white, fontSize: 22, fontWeight: 700 }}>{stat.value}</div>
          </div>
        ))}
      </div>

      {/* Recent hands mini-feed */}
      {handCount > 0 && (
        <div style={{ background: C.surface2, borderRadius: 12, padding: '14px 16px', border: `1px solid ${C.grayDark}` }}>
          <div style={{ color: C.gray, fontSize: 11, fontWeight: 600, letterSpacing: 0.8, marginBottom: 10 }}>RECENT HANDS</div>
          {Array.from({ length: Math.min(handCount, 3) }, (_, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderTop: i > 0 ? `1px solid ${C.grayDark}` : 'none' }}>
              <span style={{ color: C.textBody, fontFamily: 'Courier New, monospace', fontSize: 13 }}>Hand {handCount - i}</span>
              <span style={{ color: i === 0 ? C.greenAction : C.gray, fontSize: 12, fontWeight: 600 }}>{i === 0 ? 'Won' : i === 1 ? 'Folded' : 'Lost'}</span>
            </div>
          ))}
        </div>
      )}

      {/* Record hand CTA */}
      <div style={{ marginTop: 'auto' }}>
        <GoldButton label="+ Record Hand" onPress={onRecordHand} />
      </div>

      {/* End session */}
      <button onClick={onEndSession} style={{ background: 'none', border: 'none', color: C.gray, fontSize: 14, cursor: 'pointer', textAlign: 'center', padding: '4px 0' }}>
        End Session
      </button>
    </div>
  );
}

// ── SCREEN: NEW SESSION ───────────────────────────────────────────────────────

function NewSessionScreen({ onSelect, onBack }) {
  const [tourneyName, setTourneyName] = useState('');
  const [cashName, setCashName] = useState('');
  const [buyIn, setBuyIn] = useState('');
  const [bullet, setBullet] = useState('1');
  const [stakes, setStakes] = useState('');
  const [startingRoll, setStartingRoll] = useState('');
  const [selected, setSelected] = useState(null);
  const todayStr = new Date().toISOString().split('T')[0];
  const [sessionDate, setSessionDate] = useState(todayStr);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <ScreenHeader title="New Session" onBack={onBack || undefined} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 24px 24px', display: 'flex', flexDirection: 'column', gap: 14 }}>

// ── HOLE CARD ENTRY ───────────────────────────────────────────────────────────

function HoleCardEntry({ onComplete, onSkip }) {
  const [cards, setCards] = useState([]);
  const [selRank, setSelRank] = useState(null);

  const tapRank = (rank) => {
    if (cards.length >= 2) return;
    setSelRank(rank);
  };

  const tapSuit = (suit) => {
    if (!selRank) return;
    const next = [...cards, { rank: selRank, suit }];
    setCards(next);
    setSelRank(null);
    if (next.length === 2) setTimeout(() => onComplete(next), 250);
  };

  const tapNoSuit = () => {
    if (!selRank) return;
    const next = [...cards, { rank: selRank, suit: null }];
    setCards(next);
    setSelRank(null);
    if (next.length === 2) setTimeout(() => onComplete(next), 250);
  };

  const notation = cards.map(c => c.rank + (c.suit ? SUIT_KEYS[c.suit] : '')).join('');

  return (
    <div style={{ padding: '12px 24px', display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ color: C.gold, fontSize: 11, fontWeight: 700, letterSpacing: 1.5 }}>HOLE CARDS</span>
        <button onClick={onSkip} style={{ background: 'none', border: 'none', color: C.gray, fontSize: 13, cursor: 'pointer' }}>Skip</button>
      </div>

      {/* Card previews */}
      <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
        {[0, 1].map(i => (
          <div key={i} style={{ width: 72, height: 100, borderRadius: 10, background: cards[i] ? '#F5F0E8' : 'transparent', border: `2px solid ${cards[i] ? '#DDD' : C.grayDark + '55'}`, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, transition: 'all 0.2s', boxShadow: cards[i] ? '0 4px 16px rgba(0,0,0,0.4)' : 'none' }}>
            {cards[i] ? (
              <>
                <span style={{ fontSize: 28, fontWeight: 900, color: SUIT_COLORS[cards[i].suit] || '#333', lineHeight: 1 }}>{cards[i].rank}</span>
                <span style={{ fontSize: 22, color: SUIT_COLORS[cards[i].suit] || '#777', lineHeight: 1 }}>{cards[i].suit || '?'}</span>
              </>
            ) : (
              <span style={{ color: C.grayDark, fontSize: 30, lineHeight: 1 }}>?</span>
            )}
          </div>
        ))}
      </div>

      {/* Notation display */}
      <div style={{ textAlign: 'center', minHeight: 24 }}>
        <span style={{ fontFamily: 'Courier New, monospace', fontSize: 17, letterSpacing: 3, color: notation ? C.goldLight : C.gray }}>{notation || '· · ·'}</span>
      </div>

      {/* Rank strip */}
      <div style={{ display: 'flex', gap: 4, justifyContent: 'center', overflowX: 'auto', padding: '4px 0' }}>
        {RANKS.map(r => (
          <button key={r} onClick={() => tapRank(r)}
            style={{ minWidth: 26, height: 44, borderRadius: 8, flexShrink: 0, background: selRank === r ? C.gold : C.surface2, border: `1px solid ${selRank === r ? C.gold : C.grayDark}`, color: selRank === r ? '#0D0D0D' : C.white, fontSize: 14, fontWeight: 700, cursor: 'pointer', transition: 'all 0.1s' }}>
            {r}
          </button>
        ))}
      </div>

      {/* Suit options */}
      {selRank && (
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', padding: '10px 0 4px', animation: 'fadeIn 0.12s ease' }}>
          {SUITS.map(s => (
            <button key={s} onClick={() => tapSuit(s)}
              style={{ width: 56, height: 56, borderRadius: 12, background: C.surface3, border: `1.5px solid ${C.grayDark}`, color: SUIT_COLORS[s], fontSize: 24, cursor: 'pointer', fontWeight: 700, transition: 'all 0.1s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {s}
            </button>
          ))}
          <button onClick={tapNoSuit}
            style={{ width: 56, height: 56, borderRadius: 12, background: C.surface3, border: `1.5px solid ${C.grayDark}`, color: C.gray, fontSize: 13, cursor: 'pointer', fontWeight: 600 }}>
            ?
          </button>
        </div>
      )}

      {/* Suited / offsuit shortcuts */}
      {cards.length === 1 && !selRank && (
        <div style={{ display: 'flex', gap: 8, animation: 'fadeIn 0.15s ease' }}>
          {[{ key: 's', label: 'suited' }, { key: 'o', label: 'offsuit' }].map(sh => (
            <button key={sh.key} onClick={() => { const next = [...cards, { rank: null, suit: sh.key }]; onComplete(next); }}
              style={{ flex: 1, padding: '12px', borderRadius: 12, background: C.surface2, border: `1px solid ${C.gold}44`, color: C.goldLight, fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>
              {sh.label} ({sh.key})
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── BOARD CARD ENTRY ──────────────────────────────────────────────────────────

function BoardEntry({ street, onComplete }) {
  const count    = street === 'flop' ? 3 : 1;
  const [cards, setCards] = useState([]);
  const [selRank, setSelRank] = useState(null);
  const [texture, setTexture] = useState(null);
  const textures = ['Rainbow', 'Monotone', 'Two-Tone', 'Paired', 'Broadway'];

  const tapRank = (r) => { if (cards.length < count) setSelRank(r); };
  const tapSuit = (s) => {
    if (!selRank) return;
    const next = [...cards, { rank: selRank, suit: s }];
    setCards(next);
    setSelRank(null);
    if (next.length === count) setTimeout(() => onComplete(next), 250);
  };

  return (
    <div style={{ padding: '12px 24px', display: 'flex', flexDirection: 'column', gap: 12 }}>
      <span style={{ color: C.gold, fontSize: 11, fontWeight: 700, letterSpacing: 1.5 }}>{street.toUpperCase()} CARDS</span>

      {/* Board cards */}
      <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
        {Array(count).fill(0).map((_, i) => (
          <div key={i} style={{ width: 62, height: 88, borderRadius: 8, background: cards[i] ? '#F5F0E8' : 'transparent', border: `2px solid ${cards[i] ? '#CCC' : C.grayDark + '55'}`, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s', boxShadow: cards[i] ? '0 4px 12px rgba(0,0,0,0.4)' : 'none' }}>
            {cards[i] && (<>
              <span style={{ fontSize: 22, fontWeight: 900, color: SUIT_COLORS[cards[i].suit], lineHeight: 1 }}>{cards[i].rank}</span>
              <span style={{ fontSize: 18, color: SUIT_COLORS[cards[i].suit], lineHeight: 1 }}>{cards[i].suit}</span>
            </>)}
          </div>
        ))}
      </div>

      {/* Texture tags (flop only) */}
      {street === 'flop' && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {textures.map(t => (
            <button key={t} onClick={() => setTexture(texture === t ? null : t)}
              style={{ padding: '6px 12px', borderRadius: 20, background: texture === t ? `${C.green}88` : 'transparent', border: `1px solid ${texture === t ? C.gold : C.grayDark}`, color: texture === t ? C.goldLight : C.gray, fontSize: 12, cursor: 'pointer', transition: 'all 0.12s' }}>
              {t}
            </button>
          ))}
        </div>
      )}

      {/* Rank strip */}
      <div style={{ display: 'flex', gap: 4, overflowX: 'auto', padding: '4px 0' }}>
        {RANKS.map(r => (
          <button key={r} onClick={() => tapRank(r)}
            style={{ minWidth: 26, height: 40, borderRadius: 7, flexShrink: 0, background: selRank === r ? C.gold : C.surface2, border: `1px solid ${selRank === r ? C.gold : C.grayDark}`, color: selRank === r ? '#0D0D0D' : C.white, fontSize: 13, fontWeight: 700, cursor: 'pointer', transition: 'all 0.1s' }}>
            {r}
          </button>
        ))}
      </div>

      {selRank && (
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', animation: 'fadeIn 0.12s ease' }}>
          {SUITS.map(s => (
            <button key={s} onClick={() => tapSuit(s)}
              style={{ width: 52, height: 52, borderRadius: 10, background: C.surface3, border: `1px solid ${C.grayDark}`, color: SUIT_COLORS[s], fontSize: 22, cursor: 'pointer', fontWeight: 700 }}>
              {s}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

    <div style={{ position: 'absolute', inset: 0, zIndex: 91, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'flex-end' }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        style={{ width: '100%', background: C.surface, borderRadius: '24px 24px 0 0', padding: '20px 24px 40px', boxShadow: '0 -8px 40px rgba(0,0,0,0.7)', animation: 'slideUp 0.22s ease' }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: C.grayDark, margin: '-8px auto 16px' }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
          <span style={{ color: C.white, fontSize: 16, fontWeight: 700 }}>Raise Size</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.gray, fontSize: 20, cursor: 'pointer' }}>✕</button>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {sizes.map(s => (
            <button key={s} onClick={() => onSelect(s)}
              style={{ flex: '1 0 28%', padding: '14px 8px', borderRadius: 12, background: C.surface2, border: `1.5px solid ${C.gold}44`, color: C.goldLight, fontSize: 15, fontWeight: 700, cursor: 'pointer' }}>
              {s}
            </button>
          ))}
        </div>
        <p style={{ color: C.gray, fontSize: 12, textAlign: 'center', marginTop: 12 }}>Hold + slide on a seat at the real table to select sizing</p>
      </div>
    </div>
  );
}

// ── ACTION RECORDING (shared for preflop/flop/turn/river) ────────────────────

function ActionRound({ street, heroSeat, buttonSeat, onDone, tableSize = 9 }) {
  const [seatStates, setSeatStates] = useState(() => {
    const s = {}; for (let i = 0; i < tableSize; i++) s[i] = { action: 'pending' }; return s;
  });
  const [activeSeat,    setActiveSeat]    = useState(null);
  const [showAction,    setShowAction]    = useState(false);
  const [showSizing,    setShowSizing]    = useState(false);
  const [pendingSeat,   setPendingSeat]   = useState(null);

  const acted = Object.values(seatStates).filter(s => s.action !== 'pending').length;

  const handleSeatTap = (i) => { setActiveSeat(i); setPendingSeat(i); setShowAction(true); };
  const handleAction  = (i, action) => {
    if (action === 'raise' || action === 'open') {
      setShowAction(false); setShowSizing(true);
    } else {
      setSeatStates(s => ({ ...s, [i]: { action } }));
      setShowAction(false); setActiveSeat(null);
    }
  };
  const handleSize = (size) => {
    setSeatStates(s => ({ ...s, [pendingSeat]: { action: 'raise', size } }));
    setShowSizing(false); setActiveSeat(null); setPendingSeat(null);
  };

  const nextLabel = { preflop: 'Flop Cards', flop: 'Turn Card', turn: 'River Card', river: 'Outcome' };

  return (
    <div style={{ position: 'relative', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '12px 24px 4px' }}>
        <span style={{ color: C.gold, fontSize: 11, fontWeight: 700, letterSpacing: 1.5 }}>{street.toUpperCase()} ACTION</span>
        <p style={{ color: C.gray, fontSize: 13, marginTop: 3 }}>Tap a seat to record their action</p>
      </div>

      <TableOval>
        {getSeatPositionsForSize(tableSize).map((pos, i) => (
          <SeatButton key={i} pos={pos} index={i} heroSeat={heroSeat} buttonSeat={buttonSeat}
            seatState={seatStates[i]} activeSeat={activeSeat}
            onClick={() => handleSeatTap(i)} />
        ))}
      </TableOval>

      {acted >= 2 && (
        <div style={{ padding: '0 24px 8px', animation: 'fadeIn 0.2s ease' }}>
          <GoldButton label={`Continue → ${nextLabel[street]}`} onPress={() => onDone(seatStates)} />
        </div>
      )}

      {showAction && (
        <ActionSheet seatIndex={activeSeat} heroSeat={heroSeat}
          onAction={handleAction}
          onClose={() => { setShowAction(false); setActiveSeat(null); }} />
      )}
      {showSizing && (
        <SizingSheet onSelect={handleSize} onClose={() => { setShowSizing(false); setActiveSeat(null); setPendingSeat(null); }} />
      )}
    </div>
  );
}

// ── TABLE SCREEN (persistent hand-entry view) ─────────────────────────────────

function TableScreen({ heroSeat, tableSize, onBack, handNumber = 1, onComplete }) {
  const [buttonSeat,     setButtonSeat]     = useState(null);
  const [tablePhase,     setTablePhase]     = useState('button'); // 'button' | 'action'
  const [preflopActions, setPreflopActions] = useState({});
  const [inlineAction,     setInlineAction]     = useState(null); // { seat, hovering: null|'open'|'limp'|'raise'|'call' }
  const [lastActorOrderIdx, setLastActorOrderIdx] = useState(-1); // index in preflop order of last recorded action
  const [preflopComplete, setPreflopComplete] = useState(false); // true once preflop auto-closed
  const hoveringRef     = useRef(null); // mirrors inlineAction.hovering — avoids stale closure
  const preflopDoneRef  = useRef(false); // guard against double-firing onComplete

  const [selRanks,    setSelRanks]    = useState([]);
  const [qualifier,   setQualifier]   = useState(null);
  const [handLocked,  setHandLocked]  = useState(false);
  const [handTitle,   setHandTitle]   = useState('');

  const seatPositions = getSeatPositionsForSize(tableSize);
  const dealerX = 195, dealerY = 51;

  // Preflop action order: UTG (btn+3) → UTG+1 → ... → BTN → SB → BB
  const getPreflopOrder = (btnSeat) => {
    const order = [];
    for (let i = 0; i < tableSize; i++) order.push((btnSeat + 3 + i) % tableSize);
    return order;
  };

  // ── Phase 1: tap any non-hero seat to place the dealer button ──
  const handleSeatTap = (i) => {
    if (tablePhase === 'button' && i !== heroSeat) {
      setButtonSeat(i);
      setTablePhase('action');
    }
  };

  // ── Phase 2: hold + drag (or tap) to record the first actor ──
  const getActionPillPositions = (seatIdx) => {
    const pos = seatPositions[seatIdx];
    return {
      open: { x: Math.max(38,  pos.x - 68), y: pos.y },
      limp: { x: Math.min(352, pos.x + 68), y: pos.y },
    };
  };

  // ── Shared: fire onComplete once preflop is closed ──
  const triggerPreflopDone = (finalActions) => {
    if (preflopDoneRef.current) return;
    preflopDoneRef.current = true;
    setPreflopComplete(true);
    setInlineAction(null);
    hoveringRef.current = null;
    const holeCards = selRanks.length === 2 ? [
      { rank: selRanks[0], suit: null },
      { rank: selRanks[1], suit: qualifier === 'suited' ? 's' : qualifier === 'offsuit' ? 'o' : null }
    ] : [];
    // Brief delay so user sees the last action state before navigating
    setTimeout(() => {
      if (onComplete) onComplete({ buttonSeat, holeCards, title: handTitle, preflopActions: finalActions });
    }, 380);
  };

  const startFirstActionDrag = (e, i) => {
    if (tablePhase !== 'action' || preflopDoneRef.current) return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);

    // ── Rule 2: tapping a seat that already acted preflop signals new street ──
    // Auto-fold any remaining players and close preflop
    if (preflopActions[i] !== undefined) {
      e.currentTarget.releasePointerCapture(e.pointerId);
      const order = getPreflopOrder(buttonSeat);
      const completedActions = { ...preflopActions };
      order.forEach(seat => {
        if (completedActions[seat] === undefined) completedActions[seat] = { action: 'fold' };
      });
      triggerPreflopDone(completedActions);
      return;
    }

    const order = getPreflopOrder(buttonSeat);
    const seatIdx = order.indexOf(i);
    if (seatIdx < 0 || seatIdx <= lastActorOrderIdx) return;
    // Auto-fold only the gap between last acted seat and this one
    const newFolds = {};
    for (let j = lastActorOrderIdx + 1; j < seatIdx; j++) newFolds[order[j]] = { action: 'fold' };
    setPreflopActions(prev => ({ ...prev, ...newFolds }));
    hoveringRef.current = null;
    setInlineAction({ seat: i, hovering: null });
  };

  const moveFirstActionDrag = (e, i) => {
    if (!inlineAction || inlineAction.seat !== i) return;
    const sr  = e.currentTarget.getBoundingClientRect();
    const sCX = sr.left + sr.width  / 2;
    const sCY = sr.top  + sr.height / 2;
    const pos = seatPositions[i];
    const pills = getActionPillPositions(i);
    const openCX = sCX + (pills.open.x - pos.x);
    const limpCX = sCX + (pills.limp.x - pos.x);
    const HIT = 38;
    let hovering = null;
    if      (Math.hypot(e.clientX - openCX, e.clientY - sCY) < HIT) hovering = 'open';
    else if (Math.hypot(e.clientX - limpCX, e.clientY - sCY) < HIT) hovering = 'limp';
    hoveringRef.current = hovering;
    setInlineAction(prev => prev ? { ...prev, hovering } : null);
  };

  const endFirstActionDrag = (e, i) => {
    if (!inlineAction || inlineAction.seat !== i) return;
    e.currentTarget.releasePointerCapture(e.pointerId);
    const h = hoveringRef.current;
    if (h) {
      const order = getPreflopOrder(buttonSeat);
      const newOrderIdx = order.indexOf(i);
      const newActions = { ...preflopActions, [i]: { action: h } };
      setPreflopActions(newActions);
      setLastActorOrderIdx(newOrderIdx);
      hoveringRef.current = null;
      // ── Rule 1: BB (last in preflop order) just acted → preflop closed ──
      if (newOrderIdx === tableSize - 1) {
        triggerPreflopDone(newActions);
      } else {
        setInlineAction(null);
      }
    }
    // no release on pill → keep pills visible for tap-then-tap
  };

  // tap-then-tap path (pill onClick)
  const handleFirstAction = (action) => {
    if (!inlineAction) return;
    const seat = inlineAction.seat;
    const order = getPreflopOrder(buttonSeat);
    const newOrderIdx = order.indexOf(seat);
    const newActions = { ...preflopActions, [seat]: { action } };
    setPreflopActions(newActions);
    setLastActorOrderIdx(newOrderIdx);
    hoveringRef.current = null;
    // ── Rule 1: BB (last in preflop order) just acted → preflop closed ──
    if (newOrderIdx === tableSize - 1) {
      triggerPreflopDone(newActions);
    } else {
      setInlineAction(null);
    }
  };

  const tapRank = (rank) => {
    // Any tap after locking starts a brand-new selection
    if (handLocked) {
      setHandLocked(false);
      setQualifier(null);
      setSelRanks([rank]);
      return;
    }
    setSelRanks(prev => {
      if (prev.includes(rank)) { setQualifier(null); return prev.filter(r => r !== rank); }
      if (prev.length < 2) return [...prev, rank];
      setQualifier(null); return [rank]; // start fresh
    });
  };

  const cardNotation = selRanks.join('') + (qualifier === 'suited' ? 's' : qualifier === 'offsuit' ? 'o' : '');
  const hasAnyAction = Object.values(preflopActions).some(v => v.action !== 'fold');
  const hasRaise     = Object.values(preflopActions).some(v => v.action === 'open' || v.action === 'raise');
  const bothDone     = hasAnyAction && selRanks.length === 2;

  // Pills shown when dragging — options depend on whether a raise is already in front
  const activePills = hasRaise
    ? [
        { id: 'raise', label: 'Raise', icon: '↑↑', color: C.gold,        activeBg: C.gold,        inactiveBg: '#221C0A' },
        { id: 'call',  label: 'Call',  icon: '✓',  color: C.greenAction, activeBg: C.greenAction, inactiveBg: C.greenBg  },
      ]
    : [
        { id: 'open', label: 'Open', icon: '↑',  color: C.gold,        activeBg: C.gold,        inactiveBg: '#221C0A' },
        { id: 'limp', label: 'Limp', icon: '→',  color: C.greenAction, activeBg: C.greenAction, inactiveBg: C.greenBg  },
      ];

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

      {/* ── Top bar ── */}
      <div style={{ display: 'flex', alignItems: 'center', padding: '12px 24px 4px', flexShrink: 0, position: 'relative' }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', color: C.gold, fontSize: 22, cursor: 'pointer', padding: '4px 4px 4px 0', lineHeight: 1 }}>‹</button>
        <span style={{ position: 'absolute', left: 0, right: 0, textAlign: 'center', color: C.white, fontSize: 17, fontWeight: 700, pointerEvents: 'none' }}>Hand #{handNumber}</span>
      </div>

      {/* ── Optional hand title ── */}
      <div style={{ padding: '2px 48px 6px', flexShrink: 0 }}>
        <input
          type="text"
          value={handTitle}
          onChange={e => setHandTitle(e.target.value)}
          placeholder="Add a title... (optional)"
          style={{ width: '100%', background: 'transparent', border: 'none', borderBottom: `1px solid ${C.grayDark}`, color: C.goldLight, fontSize: 13, padding: '3px 0', outline: 'none', fontFamily: '-apple-system, sans-serif', textAlign: 'center', caretColor: C.gold, '::placeholder': { color: C.gray } }}
        />
      </div>

      {/* ── Table section status (above table) ── */}
      {(() => {
        const dotColor  = preflopComplete ? C.greenAction : tablePhase === 'action' ? C.gold : C.grayDark;
        const textColor = preflopComplete ? C.greenAction : tablePhase === 'action' ? C.gold : C.gray;
        const nonFoldEntries = Object.entries(preflopActions).filter(([, v]) => v.action !== 'fold');
        const actionSummary  = nonFoldEntries.map(([seat, v]) => {
          const label = v.action === 'open' ? 'opened' : v.action === 'limp' ? 'limped' : v.action === 'raise' ? 'raised' : 'called';
          return `Seat ${Number(seat) + 1} ${label}`;
        }).join(' · ');
        const label =
          preflopComplete         ? `Preflop ✓  →  Moving to flop...` :
          tablePhase === 'button' ? 'Tap a seat to place the dealer button' :
          !hasAnyAction           ? `Dealer: Seat ${buttonSeat + 1} · Now tap the first seat to act` :
          /* actions in progress */  `Dealer: Seat ${buttonSeat + 1} · ${actionSummary}`;
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '0 24px 4px', flexShrink: 0 }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: dotColor, flexShrink: 0, boxShadow: tablePhase !== 'button' ? `0 0 6px ${dotColor}` : 'none', transition: 'all 0.2s' }} />
            <span style={{ color: textColor, fontSize: 12, fontWeight: tablePhase !== 'button' ? 600 : 400, transition: 'all 0.2s' }}>{label}</span>
          </div>
        );
      })()}

      {/* ── Table ── */}
      <TableOval>
        {/* Dealer notch */}
        <div style={{ position: 'absolute', left: dealerX - 36, top: dealerY - 12, width: 72, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#1A1A1A', border: `1px solid ${C.gold}44`, borderRadius: 12, pointerEvents: 'none' }}>
          <span style={{ color: `${C.gold}BB`, fontSize: 9, fontWeight: 700, letterSpacing: 2 }}>DEALER</span>
        </div>

        {/* Seats */}
        {seatPositions.map((pos, i) => {
          const isHero    = i === heroSeat;
          const hasButton = i === buttonSeat;
          const seatAction = preflopActions[i]?.action;
          const isFolded   = seatAction === 'fold';
          const isAggressor = seatAction === 'open' || seatAction === 'raise';
          const isCaller    = seatAction === 'call' || seatAction === 'limp';
          const hasAction   = isAggressor || isCaller;
          const isPending   = inlineAction?.seat === i;

          // Derive seat visual theme
          let bg     = isHero ? C.green    : C.surface2;
          let border = isHero ? C.gold     : C.grayDark;
          let color  = isHero ? C.gold     : C.gray;
          let shadow = isHero ? `0 0 12px rgba(201,168,76,0.2)` : 'none';
          if (isFolded)        { bg = C.redBg;    border = C.red;         color = C.red;         shadow = 'none'; }
          else if (isAggressor){ bg = '#221C0A';  border = C.gold;        color = C.gold;        shadow = `0 0 10px ${C.gold}55`; }
          else if (isCaller)   { bg = C.greenBg;  border = C.greenAction; color = C.greenAction; shadow = `0 0 10px ${C.greenAction}44`; }
          else if (isPending)  { border = C.gold; shadow = `0 0 16px ${C.gold}88`; }

          // Content inside the circle
          const seatContent = (() => {
            if (isFolded)      return <span style={{ fontSize: 14, lineHeight: 1 }}>✕</span>;
            if (isAggressor)   return <span style={{ fontSize: 12, lineHeight: 1 }}>{seatAction === 'raise' ? '↑↑' : '↑'}</span>;
            if (isCaller)      return <span style={{ fontSize: 13, lineHeight: 1 }}>✓</span>;
            if (isHero && selRanks.length > 0) return (
              <>
                <span style={{ fontSize: selRanks.length === 2 ? 10 : 13, fontWeight: 900, lineHeight: 1, letterSpacing: -0.5 }}>
                  {selRanks.join('') + (qualifier === 'suited' ? 's' : qualifier === 'offsuit' ? 'o' : '')}
                </span>
                <span style={{ fontSize: 6, color: `${C.gold}66`, lineHeight: 1 }}>YOU</span>
              </>
            );
            return (
              <>
                <span style={{ fontSize: 10, lineHeight: 1 }}>{i + 1}</span>
                {isHero && <span style={{ fontSize: 7, color: `${C.gold}77`, lineHeight: 1 }}>YOU</span>}
              </>
            );
          })();

          return (
            <div key={i} style={{ position: 'absolute', left: pos.x - 22, top: pos.y - 22, zIndex: 5 }}>
              {hasButton && (
                <div style={{ position: 'absolute', top: -7, right: -7, zIndex: 10, width: 18, height: 18, borderRadius: '50%', background: C.white, border: `1.5px solid ${C.gold}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 8, fontWeight: 900, color: '#000', boxShadow: `0 0 8px rgba(255,255,255,0.4)` }}>D</div>
              )}
              <button
                onClick={tablePhase === 'button' ? () => handleSeatTap(i) : undefined}
                onPointerDown={tablePhase === 'action' && !preflopComplete ? (e) => startFirstActionDrag(e, i) : undefined}
                onPointerMove={tablePhase === 'action' && !preflopComplete ? (e) => moveFirstActionDrag(e, i) : undefined}
                onPointerUp={tablePhase === 'action' && !preflopComplete ? (e) => endFirstActionDrag(e, i) : undefined}
                style={{
                  width: 44, height: 44, borderRadius: '50%',
                  cursor: (tablePhase === 'button' && i === heroSeat) || preflopComplete ? 'default' : 'pointer',
                  background: bg, border: `2px solid ${border}`, color,
                  fontSize: 10, fontWeight: 700,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1,
                  transition: 'all 0.15s', boxShadow: shadow,
                  touchAction: tablePhase === 'action' ? 'none' : 'auto',
                  userSelect: 'none',
                }}>
                {seatContent}
              </button>
            </div>
          );
        })}
        {/* ── Inline action pills (appear left/right of seat on hold or tap) ── */}
        {inlineAction !== null && (() => {
          const pos   = seatPositions[inlineAction.seat];
          const pills = getActionPillPositions(inlineAction.seat);
          const BW = 62, BH = 34;
          const actions = activePills.map((p, idx) => ({
            ...p,
            cx: idx === 0 ? pills.open.x : pills.limp.x,
          }));
          return actions.map(a => {
            const isHot = inlineAction.hovering === a.id;
            return (
              <div key={a.id} onClick={() => handleFirstAction(a.id)}
                style={{
                  position: 'absolute', left: a.cx - BW/2, top: pos.y - BH/2, zIndex: 30,
                  width: BW, height: BH, borderRadius: BH/2,
                  background: isHot ? a.activeBg : a.inactiveBg,
                  border: `2px solid ${a.color}`,
                  color: isHot ? '#0D0D0D' : a.color,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4,
                  cursor: 'pointer', pointerEvents: 'all',
                  fontSize: 10, fontWeight: 800, letterSpacing: 0.3,
                  animation: 'fadeIn 0.13s ease',
                  transition: 'background 0.1s, color 0.1s',
                  boxShadow: isHot ? `0 0 18px ${a.color}88` : `0 2px 10px rgba(0,0,0,0.6)`,
                }}>
                <span style={{ fontSize: 14 }}>{a.icon}</span>
                <span>{a.label}</span>
              </div>
            );
          });
        })()}
      </TableOval>

      {/* ── Below-table area ── */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '4px 20px 0', overflowY: 'auto' }}>

        {/* ── Hole cards status (above rank grid) ── */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '4px 0 8px', flexShrink: 0 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: selRanks.length === 2 ? C.greenAction : C.grayDark, flexShrink: 0, boxShadow: selRanks.length === 2 ? `0 0 6px ${C.greenAction}` : 'none', transition: 'all 0.2s' }} />
          <span style={{ color: selRanks.length === 2 ? C.goldLight : C.gray, fontSize: 12, fontWeight: selRanks.length === 2 ? 600 : 400, fontFamily: selRanks.length === 2 ? 'Courier New, monospace' : 'inherit', letterSpacing: selRanks.length === 2 ? 1 : 0, transition: 'all 0.2s' }}>
            {selRanks.length === 2 ? cardNotation : 'Enter your hole cards'}
          </span>
        </div>

        {/* ── Rank grid ── */}
        <div style={{ flexShrink: 0 }}>

          {/* Suited / Offsuit + Clear — above the grid, shown once both ranks chosen and not yet locked */}
          {selRanks.length === 2 && !handLocked && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 8, marginBottom: 8, animation: 'fadeIn 0.15s ease' }}>
              <button onClick={() => { setQualifier('suited');  setHandLocked(true); }}
                style={{ padding: '7px 20px', borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: 'pointer', transition: 'all 0.12s', background: C.surface2, border: `1px solid ${C.grayDark}`, color: C.gray }}>
                Suited
              </button>
              <button onClick={() => { setQualifier('offsuit'); setHandLocked(true); }}
                style={{ padding: '7px 20px', borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: 'pointer', transition: 'all 0.12s', background: C.surface2, border: `1px solid ${C.grayDark}`, color: C.gray }}>
                Offsuit
              </button>
              <button onClick={() => { setSelRanks([]); setQualifier(null); setHandLocked(false); }}
                style={{ background: 'none', border: 'none', color: C.gray, fontSize: 11, cursor: 'pointer' }}>
                Clear
              </button>
            </div>
          )}

          {[['A','K','Q','J','T','9','8'], ['7','6','5','4','3','2']].map((row, ri) => (
            <div key={ri} style={{ display: 'flex', gap: 4, justifyContent: 'center', marginBottom: 4 }}>
              {row.map(r => {
                const isSelected = !handLocked && selRanks.includes(r);
                return (
                  <button key={r} onClick={() => tapRank(r)}
                    style={{ width: 40, height: 38, borderRadius: 8, background: isSelected ? C.gold : C.surface2, border: `1px solid ${isSelected ? C.gold : C.grayDark}`, color: isSelected ? '#0D0D0D' : C.white, fontSize: 15, fontWeight: 700, cursor: 'pointer', transition: 'all 0.1s' }}>
                    {r}
                  </button>
                );
              })}
            </div>
          ))}
        </div>

      </div>

    </div>
  );
}

// ── PROGRESS BAR ──────────────────────────────────────────────────────────────

function ProgressBar({ step, total, label }) {
  return (
    <div style={{ padding: '10px 24px 6px', display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
      <span style={{ color: C.gold, fontSize: 11, fontWeight: 700, letterSpacing: 1, whiteSpace: 'nowrap' }}>{label}</span>
      <div style={{ flex: 1, height: 2, background: C.grayDark, borderRadius: 1, overflow: 'hidden' }}>
        <div style={{ width: `${(step / total) * 100}%`, height: '100%', background: `linear-gradient(90deg, ${C.gold}, ${C.goldLight})`, borderRadius: 1, transition: 'width 0.3s ease' }} />
      </div>
      <span style={{ color: C.gray, fontSize: 11, whiteSpace: 'nowrap' }}>{step}/{total}</span>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────

const STEPS = ['hole_cards','button','preflop','flop_entry','flop','turn_entry','turn','river_entry','river','outcome','save'];
const STEP_LABELS = ['Hole Cards','Dealer Button','Preflop','Flop Cards','Flop Action','Turn Card','Turn Action','River Card','River Action','Outcome','Save'];

function App() {
  const [screen,        setScreen]        = useState('no_session');
  const [activeTab,     setActiveTab]     = useState('record');
  const [sessionType,   setSessionType]   = useState(null);
  const [heroSeat,      setHeroSeat]      = useState(null);
  const [step,          setStep]          = useState(0);
  const [handData,      setHandData]      = useState({});
  const [buttonSeat,    setButtonSeat]    = useState(null);
  const [sessionActive, setSessionActive] = useState(false);
  const [sessionStart,  setSessionStart]  = useState(null);
  const [handCount,     setHandCount]     = useState(0);
  const [tableSize,     setTableSize]     = useState(9);

  const resetHand = () => {
    setStep(2); // preflop — seat + cards are captured on table_screen
    setHandData({ sessionType });
    setButtonSeat(null);
    setScreen('table_screen');
  };

  const handleTabChange = (tab) => {
    setActiveTab(tab);
    if (tab === 'record') {
      if (sessionActive) setScreen('session_dash');
      else setScreen('no_session');
    }
  };

  const renderStep = () => {
    const s = STEPS[step];

    if (s === 'hole_cards') return (
      <HoleCardEntry
        onComplete={cards => { setHandData(d => ({ ...d, holeCards: cards })); setStep(1); }}
        onSkip={() => { setHandData(d => ({ ...d, holeCards: [] })); setStep(1); }} />
    );
    if (s === 'button') return (
      <ButtonPlacement heroSeat={heroSeat} tableSize={tableSize} onPlace={seat => { setButtonSeat(seat); setStep(2); }} />
    );
    if (s === 'preflop') return (
      <ActionRound street="preflop" heroSeat={heroSeat} buttonSeat={buttonSeat} tableSize={tableSize}
        onDone={states => { setHandData(d => ({ ...d, preflopActions: states })); setStep(3); }} />
    );
    if (s === 'flop_entry') return (
      <BoardEntry street="flop" onComplete={cards => { setHandData(d => ({ ...d, flop: cards })); setStep(4); }} />
    );
    if (s === 'flop') return (
      <ActionRound street="flop" heroSeat={heroSeat} buttonSeat={buttonSeat} tableSize={tableSize}
        onDone={states => { setHandData(d => ({ ...d, flopActions: states })); setStep(5); }} />
    );
    if (s === 'turn_entry') return (
      <BoardEntry street="turn" onComplete={cards => { setHandData(d => ({ ...d, turn: cards })); setStep(6); }} />
    );
    if (s === 'turn') return (
      <ActionRound street="turn" heroSeat={heroSeat} buttonSeat={buttonSeat} tableSize={tableSize}
        onDone={states => { setHandData(d => ({ ...d, turnActions: states })); setStep(7); }} />
    );
    if (s === 'river_entry') return (
      <BoardEntry street="river" onComplete={cards => { setHandData(d => ({ ...d, river: cards })); setStep(8); }} />
    );
    if (s === 'river') return (
      <ActionRound street="river" heroSeat={heroSeat} buttonSeat={buttonSeat} tableSize={tableSize}
        onDone={states => { setHandData(d => ({ ...d, riverActions: states })); setStep(9); }} />
    );
    if (s === 'outcome') return (
      <OutcomeScreen onComplete={result => { setHandData(d => ({ ...d, outcome: result })); setStep(10); }} />
    );
    if (s === 'save') return (
      <SaveScreen handData={handData} onNewHand={() => { setHandCount(n => n + 1); resetHand(); }} onDone={() => { setHandCount(n => n + 1); setScreen('session_dash'); }} />
    );
  };

  const renderScreen = () => {
    // No active session → go straight to New Session picker
    if (screen === 'no_session') return (
      <NewSessionScreen
        onSelect={type => {
          setSessionType(type);
          setHandData({ sessionType: type });
          setScreen('seat_select');
        }}
        onBack={null} />
    );

    if (screen === 'new_session') return (
      <NewSessionScreen
        onSelect={type => { setSessionType(type); setHandData({ sessionType: type }); setScreen('seat_select'); }}
        onBack={() => setScreen(sessionActive ? 'session_dash' : 'no_session')} />
    );

    if (screen === 'seat_select') return (
      <SeatSelectScreen
        tableSize={tableSize}
        onTableSizeChange={setTableSize}
        onSelect={seat => {
          setHeroSeat(seat);
          setSessionActive(true);
          setSessionStart(Date.now());
          setHandCount(0);
          setScreen('table_screen');
        }}
        onBack={() => setScreen('no_session')} />
    );

    if (screen === 'table_screen') return (
      <TableScreen
        heroSeat={heroSeat}
        tableSize={tableSize}
        handNumber={handCount + 1}
        onBack={() => setScreen(handCount === 0 ? 'seat_select' : 'session_dash')}
        onComplete={({ buttonSeat: bs, holeCards, title, preflopActions: pa }) => {
          setButtonSeat(bs);
          setHandData(d => ({ ...d, holeCards, handTitle: title, preflopActions: pa }));
          setStep(3); // skip to flop_entry — button + preflop captured on table_screen
          setScreen('hand_flow');
        }}
      />
    );

    // Live session dashboard
    if (screen === 'session_dash') return (
      <SessionDashboard
        sessionType={sessionType}
        handCount={handCount}
        startTime={sessionStart}
        onRecordHand={resetHand}
        onEndSession={() => {
          setSessionActive(false);
          setSessionType(null);
          setHeroSeat(null);
          setHandCount(0);
          setSessionStart(null);
          setScreen('no_session');
        }} />
    );

    if (screen === 'hand_flow') return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', padding: '8px 24px 0', flexShrink: 0 }}>
          <button onClick={() => { if (step > 0) setStep(s => s - 1); else setScreen('session_dash'); }}
            style={{ background: 'none', border: 'none', color: C.gold, fontSize: 16, cursor: 'pointer', padding: '8px 8px 8px 0', display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ fontSize: 18 }}>‹</span> {step > 0 ? 'Back' : 'Session'}
          </button>
        </div>
        <ProgressBar step={step + 1} total={STEPS.length} label={STEP_LABELS[step]} />
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {renderStep()}
        </div>
      </div>
    );

    return null;
  };

  return (
    <div className="phone-frame">
      <div className="notch" />
      <StatusBar />
      <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100% - 50px)', background: C.bg, position: 'relative' }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflowY: 'auto', paddingBottom: 83 }}>
          {renderScreen()}
        </div>
        <TabBar activeTab={activeTab} onTabChange={handleTabChange} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
